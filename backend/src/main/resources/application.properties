server.port=8080

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Seed data via DataInitializer (see config/DataInitializer.java)
spring.sql.init.mode=never

# JWT
app.jwt.secret=SubscriptionManagerChurnPredictionSecretKey2026MustBeAtLeast256BitsLong!!
app.jwt.expiration-ms=86400000

# CORS (frontend Vite default)
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175

# Mail (configure for production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=noreply@subscriptionmanager.com
app.mail.enabled=false

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Integrations (placeholders)
app.integration.stripe.api-key=sk_test_placeholder
app.integration.razorpay.key-id=rzp_test_placeholder
app.integration.razorpay.key-secret=placeholder
app.integration.paypal.client-id=placeholder

# Logging
logging.level.com.subscriptionmanager=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.postgresql=DEBUG
